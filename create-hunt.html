<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Hunt — Happy Hunting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat:wght@400;700&family=Special+Elite&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hunt.css">
</head>
<body class="hh-landing">

    <header class="hh-header">
        <a href="happy-hunting.html" class="hh-back">&larr; Happy Hunting</a>
        <h1>Create a Hunt</h1>
        <p class="hh-tagline">Pick a bar. Build clues. Send it to someone.</p>
    </header>

    <main class="create-main">

        <!-- Step 1: Choose Bar -->
        <section class="create-section" id="bar-section">
            <h2 class="create-section-title">1. Choose your destination</h2>
            <div class="bar-search-wrap" id="bar-search-wrap">
                <input type="text" id="bar-search" class="bar-search" placeholder="Search bars by name or neighborhood..." autocomplete="off">
                <div class="bar-results" id="bar-results"></div>
            </div>
            <div class="bar-pending" id="bar-pending" hidden>
                <div class="bar-pending-info">
                    <div class="bar-pending-name" id="bar-pending-name"></div>
                    <div class="bar-pending-detail" id="bar-pending-detail"></div>
                </div>
                <div class="bar-pending-actions">
                    <button class="bar-confirm-btn" id="bar-confirm">Confirm</button>
                    <button class="bar-change-btn" id="bar-change-pending">Different bar</button>
                </div>
            </div>
            <div class="bar-confirmed" id="bar-confirmed" hidden>
                <div class="bar-confirmed-check">&#10003;</div>
                <div class="bar-confirmed-info">
                    <div class="bar-confirmed-name" id="bar-confirmed-name"></div>
                    <div class="bar-confirmed-detail" id="bar-confirmed-detail"></div>
                </div>
                <button class="bar-change-btn" id="bar-change">Change</button>
            </div>
        </section>

        <!-- Suggestions (shown after bar confirmed) -->
        <section class="create-section" id="suggestions-section" hidden>
            <h2 class="create-section-title">Nearby facts &amp; streets</h2>
            <p class="create-hint">Tap a fact to use it in your current clue</p>
            <div class="suggestions-grid" id="suggestions-grid"></div>
        </section>

        <!-- Step 2: Build Clues (card-by-card) -->
        <section class="create-section" id="clues-section" hidden>
            <h2 class="create-section-title">2. Build your clues</h2>

            <!-- Completed cards summary -->
            <div class="build-cards-summary" id="build-cards-summary"></div>

            <!-- Active build card -->
            <div class="build-card" id="build-card" hidden>
                <div class="build-card-header">
                    <span class="build-card-label" id="build-card-label">Clue 1</span>
                    <span class="build-card-answer" id="build-card-answer"></span>
                </div>
                <div class="build-card-text" id="build-card-text"></div>
                <textarea class="build-card-edit" id="build-card-edit" hidden rows="4" placeholder="Edit the clue..."></textarea>
                <div class="build-card-actions" id="build-card-actions">
                    <button class="build-btn build-btn-confirm" id="build-confirm">Confirm</button>
                    <button class="build-btn build-btn-edit" id="build-edit">Edit</button>
                    <button class="build-btn build-btn-regen" id="build-regen">Regenerate</button>
                </div>
            </div>

            <!-- Add another (shown after 3+ confirmed) -->
            <button class="add-stop-btn" id="add-stop-btn" hidden>+ Add Another Clue</button>
        </section>

        <!-- Step 3: Preview + Generate -->
        <section class="create-section" id="generate-section" hidden>
            <h2 class="create-section-title">3. Preview &amp; share</h2>

            <!-- Skin selector -->
            <div class="create-controls">
                <div class="create-control-group">
                    <span class="control-label">Style</span>
                    <div class="control-btns">
                        <button class="ctrl-btn active" data-skin="ransom">Ransom</button>
                        <button class="ctrl-btn" data-skin="script">Script</button>
                        <button class="ctrl-btn" data-skin="napkin">Napkin</button>
                    </div>
                </div>
            </div>

            <!-- Carousel preview -->
            <div class="carousel" id="carousel">
                <button class="carousel-arrow carousel-prev" id="carousel-prev">&lsaquo;</button>
                <div class="carousel-viewport" id="carousel-viewport"></div>
                <button class="carousel-arrow carousel-next" id="carousel-next">&rsaquo;</button>
                <div class="carousel-dots" id="carousel-dots"></div>
            </div>

            <!-- Theme + Generate -->
            <label class="create-theme-label">
                <span>Hunt theme</span>
                <input type="text" id="hunt-theme-input" placeholder="e.g. Mayors, Fires, and a Street That Lost Its Name" autocomplete="off">
            </label>
            <button class="send-generate" id="create-generate">Generate Link</button>
            <div class="create-result" id="create-result" hidden>
                <p class="send-instructions">Your hunt is ready. Copy this link and share it.</p>
                <div class="send-link-row">
                    <input type="text" id="create-link" readonly>
                    <button id="create-copy">Copy</button>
                </div>
            </div>
        </section>

    </main>

    <script src="ransom-text.js"></script>
    <script src="create-hunt.js"></script>
</body>
</html>
