<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clue QA — Happy Hunting</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">Clue QA</span>
      <select id="bar-select"></select>
    </div>
    <div class="header-stats" id="stats"></div>
    <div class="header-right">
      <select id="filter-ring">
        <option value="all">All Rings</option>
        <option value="1">Ring 1</option>
        <option value="2">Ring 2</option>
        <option value="3">Ring 3</option>
      </select>
      <select id="filter-type">
        <option value="all">All Types</option>
      </select>
      <select id="filter-status">
        <option value="all">All Status</option>
        <option value="unreviewed">Unreviewed</option>
        <option value="favorite">Favorited</option>
        <option value="flagged">Flagged</option>
        <option value="edited">Edited</option>
        <option value="deleted">Deleted</option>
      </select>
      <button id="export-pool">Export Pool</button>
      <button id="export-qa">Export QA</button>
    </div>
  </header>

  <main>
    <section id="map-panel">
      <div id="map"></div>
      <div id="route-info"></div>
    </section>
    <section id="list-panel">
      <div id="clue-list"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
